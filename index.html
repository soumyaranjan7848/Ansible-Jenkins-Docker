<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* Navbar */
nav {
    background: #111;
    color: #fff;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

nav h2 {
    margin: 0;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li {
    cursor: pointer;
}

/* Hero */
.hero {
    background: url('https://images.unsplash.com/photo-1523275335684-37898b6baf30') no-repeat center/cover;
    height: 60vh;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
}

.hero button {
    padding: 10px 20px;
    border: none;
    background: orange;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* Products */
.products {
    padding: 40px;
    text-align: center;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card h3 {
    margin: 10px 0;
}

.card button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

/* Footer */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>🛒 DevOps Store</h2>
    <ul>
        <li>Home</li>
        <li>Products</li>
        <li>Contact</li>
    </ul>
</nav>

<!-- Hero -->
<div class="hero">
    <h1>Welcome to DevOps Store 🚀</h1>
    <p>Deployed using Jenkins + Ansible</p>
    <button>Shop Now</button>
</div>

<!-- Products -->
<section class="products">
    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
            <h3>Smartphone</h3>
            <p>₹15,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
            <h3>Laptop</h3>
            <p>₹55,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1518441902117-9c2d0cba0f7d">
            <h3>Headphones</h3>
            <p>₹2,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">
            <h3>Smart Watch</h3>
            <p>₹4,999</p>
            <button>Buy Now</button>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 DevOps Store | Built with ❤️ using Jenkins & Ansible</p>
</footer>

</body>
</html>
