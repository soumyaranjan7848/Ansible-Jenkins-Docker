<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotstar Clone</title>

<style>
body {
    margin: 0;
    background-color: #0f171e;
    font-family: Arial, sans-serif;
    color: white;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #0f171e;
}

nav h2 {
    color: #1f80e0;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 20px;
}

nav ul li {
    cursor: pointer;
}

/* Hero */
.hero {
    height: 70vh;
    background: url('https://images.unsplash.com/photo-1608889175123-8ee362201f81') no-repeat center/cover;
    display: flex;
    align-items: center;
    padding: 40px;
}

.hero-content {
    max-width: 500px;
}

.hero h1 {
    font-size: 50px;
}

.hero button {
    background: #1f80e0;
    border: none;
    padding: 12px 20px;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

/* Rows */
.row {
    padding: 20px;
}

.row h2 {
    margin-bottom: 10px;
}

.row-posters {
    display: flex;
    overflow-x: scroll;
}

.row-posters img {
    width: 200px;
    margin-right: 10px;
    transition: transform 0.3s;
}

.row-posters img:hover {
    transform: scale(1.1);
}

/* Hide scrollbar */
.row-posters::-webkit-scrollbar {
    display: none;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>Disney+ Hotstar</h2>
    <ul>
        <li>Home</li>
        <li>TV</li>
        <li>Movies</li>
        <li>Sports</li>
    </ul>
</nav>

<!-- Hero -->
<div class="hero">
    <div class="hero-content">
        <h1>Avengers: Endgame</h1>
        <p>Watch the epic conclusion of the Infinity Saga.</p>
        <button>▶ Watch Now</button>
    </div>
</div>

<!-- Movie Rows -->
<div class="row">
    <h2>Trending Now</h2>
    <div class="row-posters">
        <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
        <img src="https://image.tmdb.org/t/p/w500/6ELCZlTA5lGUops70hKdB83WJxH.jpg">
        <img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
        <img src="https://image.tmdb.org/t/p/w500/xBHvZcjRiWyobQ9kxBhO6B2dtRI.jpg">
    </div>
</div>

<div class="row">
    <h2>Popular Movies</h2>
    <div class="row-posters">
        <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
        <img src="https://image.tmdb.org/t/p/w500/kqjL17yufvn9OVLyXYpvtyrFfak.jpg">
        <img src="https://image.tmdb.org/t/p/w500/5P8SmMzSNYikXpxil6BYzJ16611.jpg">
        <img src="https://image.tmdb.org/t/p/w500/r7XifzvtezNt31ypvsmb6Oqxw49.jpg">
    </div>
</div>

<div class="row">
    <h2>Top Rated</h2>
    <div class="row-posters">
        <img src="https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg">
        <img src="https://image.tmdb.org/t/p/w500/jTswp6KyDYKtvC52GbHagrZbGvD.jpg">
        <img src="https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg">
        <img src="https://image.tmdb.org/t/p/w500/aNtAP8ZzUMdnCPoqYgVOcgI0Eh4.jpg">
    </div>
</div>

</body>
</html>
